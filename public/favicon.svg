<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1715;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D2926;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FAF9F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9B99A;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with warm dark tone -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle warm accent line top -->
  <rect x="4" y="3.5" width="24" height="1.5" rx="0.75" fill="#A09484" opacity="0.5"/>
  <!-- EK monogram -->
  <text x="16" y="21.5"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="700"
    font-style="italic"
    fill="url(#textGrad)"
    text-anchor="middle"
    letter-spacing="-0.5">EK</text>
</svg>
