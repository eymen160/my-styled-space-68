/* ── RESET & BASE ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

/* ── PROGRESS BAR ── */

/* ── CUSTOM CURSOR ── */

#cursor-ring {

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes slideRight {

}
@keyframes marquee {

@keyframes pulse {

}
@keyframes float {

  50%     { transform: translateY(-6px); }
}
@keyframes countUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ── HERO ENTRANCE — JS adds .hero-animating after mount ── */
/* Default: fully visible (no JS / slow load = still readable) */
.hero-enter { opacity: 1; transform: none; }
/* Once JS has mounted, play the entrance */
.hero-animating .hero-enter {

/* ── SCROLL REVEAL ── */

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════════
   HOOKS
═══════════════════════════════════════════ */
function useScrollReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.sr');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
      });
    }, { rootMargin: '-60px 0px' });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}

function useProgressBar() {
  useEffect(() => {
    const bar = document.getElementById('progress-bar');
    const fn = () => {
      const total = document.body.scrollHeight - window.innerHeight;
      if (bar && total > 0) bar.style.width = `${(window.scrollY / total) * 100}%`;
    };
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
}

function useCursor() {
  useEffect(() => {
    const dot  = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    let rx = 0, ry = 0, mx = 0, my = 0;
    const moveMouse = e => { mx = e.clientX; my = e.clientY; };
    document.addEventListener('mousemove', moveMouse, { passive: true });
    const tick = () => {
      rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
      if (dot)  { dot.style.left  = mx + 'px'; dot.style.top  = my + 'px'; }
      if (ring) { ring.style.left = rx + 'px'; ring.style.top = ry + 'px'; }
      requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
    return () => document.removeEventListener('mousemove', moveMouse);
  }, []);
}

function useCounter(target, suffix = '', decimals = 0) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const dur = 1600;
        const step = ts => {
          const pct = Math.min((ts - start) / dur, 1);
          const ease = 1 - Math.pow(1 - pct, 3);
          setVal((target * ease).toFixed(decimals));
          if (pct < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
        obs.disconnect();
      }
    }, { rootMargin: '-40px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, [target]);
  return [val, ref];
}

/* ═══════════════════════════════════════════
   SCROLL NAV
═══════════════════════════════════════════ */
function scrollTo(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const y = el.getBoundingClientRect().top + window.scrollY - 64;
  window.scrollTo({ top: y, behavior: 'smooth' });
}

              style={{ fontFamily: 'var(--sans)', fontSize: 13, color: 'rgba(255,255,255,0.3)', textDecoration: 'none', transition: 'color .2s' }}
              onMouseEnter={e => e.currentTarget.style.color = '#fff'}
              onMouseLeave={e => e.currentTarget.style.color = 'rgba(255,255,255,0.3)'}
            >{l}</a>
          ))}
        </div>
      </div>
    </footer>
  );
}

/* ═══════════════════════════════════════════
   APP
═══════════════════════════════════════════ */
function App() {
  const [active, setActive] = useState('');

  useScrollReveal();
  useProgressBar();
  useCursor();

  useEffect(() => {
    const sections = ['about','projects','research','contact'];
    const fn = () => {
      for (const id of sections) {
        const el = document.getElementById(id);
        if (el) {
          const r = el.getBoundingClientRect();
          if (r.top <= 80 && r.bottom >= 80) { setActive(id); return; }
        }
      }
      if (window.scrollY < 80) setActive('');
    };
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <>
      <Header active={active} />
      <main>
        <Hero />
        <Marquee />
        <About />
        <Projects />
        <Research />
        <Contact />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
